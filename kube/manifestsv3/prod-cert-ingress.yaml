apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingress-cert-rob
  namespace: istio-system
spec:
  secretName: ingress-cert-rob
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: rob.salmond.ca
  dnsNames:
  - rob.salmond.ca

---

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ingress-cert-growth
  namespace: istio-system
spec:
  secretName: ingress-cert-growth
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  commonName: growthfestival.ca
  dnsNames:
  - growthfestival.ca
